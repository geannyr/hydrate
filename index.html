<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1525" />
    <title>Hydrate · Water Tracker</title>
    <meta name="description" content="Track your daily water intake — calculated from your weight and activity level." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <script>
      // Apply theme before paint
      (function () {
        try {
          var saved = localStorage.getItem('hydrate.theme');
          var root = document.documentElement;
          if (saved === 'light') {
            root.classList.remove('dark');
            root.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
