<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#fdfaf3" />
    <title>Hydrate · Water Tracker</title>
    <meta name="description" content="Track your daily water intake — calculated from your weight and activity level." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <script>
      // Apply theme before paint — default is light (paper)
      (function () {
        try {
          var saved = localStorage.getItem('hydrate.theme');
          var root = document.documentElement;
          if (saved === 'dark') {
            root.classList.remove('light');
            root.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!-- Inline SVG filter defs used by sketch borders. Soft wobble for cute hand-drawn feel. -->
    <svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute;pointer-events:none;">
      <defs>
        <filter id="sketch-1" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.018" numOctaves="2" seed="1" result="t" />
          <feDisplacementMap in="SourceGraphic" in2="t" scale="1.3" />
        </filter>
        <filter id="sketch-2" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="t" />
          <feDisplacementMap in="SourceGraphic" in2="t" scale="1.6" />
        </filter>
        <filter id="sketch-3" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.025" numOctaves="2" seed="7" result="t" />
          <feDisplacementMap in="SourceGraphic" in2="t" scale="1.1" />
        </filter>
        <filter id="sketch-soft" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="2" seed="2" result="t" />
          <feDisplacementMap in="SourceGraphic" in2="t" scale="0.8" />
        </filter>
        <!-- Tiny dotted pattern for water fill — soft polka instead of dense hatching -->
        <pattern id="dots-water" patternUnits="userSpaceOnUse" width="9" height="9">
          <circle cx="4.5" cy="4.5" r="1.05" fill="currentColor" opacity="0.55" />
        </pattern>
        <pattern id="dots-water-dense" patternUnits="userSpaceOnUse" width="7" height="7">
          <circle cx="3.5" cy="3.5" r="0.95" fill="currentColor" opacity="0.6" />
        </pattern>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
